name: Selenium POM CI

on:
  push:
    branches:
      - main
    paths:
      - "testing16-selenium-pom/**"
      - ".github/workflows/selenium-pom-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "testing16-selenium-pom/**"
      - ".github/workflows/selenium-pom-ci.yml"

# Sẽ tự động cd vào folder cần chạy (ĐỌC LƯU Ý BÊN DƯỚI)
defaults:
  run:
    working-directory: testing16-selenium-pom

jobs:
  selenium-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: '21'
          cache: 'maven'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium test
        run: mvn -B test -Dheadless=true -Djava.awt.headless=true